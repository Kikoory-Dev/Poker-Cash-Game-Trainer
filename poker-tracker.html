<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Poker Flags & Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
:root{--bg:#1a2218;--bg2:#1f2e1c;--bg3:#162014;--border:#2e3d2b;--border2:#3a5035;--green:#6db87a;--green2:#a8d4b0;--green3:#4a9d5e;--red:#d96060;--amber:#d4a847;--blue:#70b4d4;--muted:#6b7d62;--text:#e8f0e4;--text2:#c8dbc4;--text3:#8fa882;--nav-h:56px;--safe-b:env(safe-area-inset-bottom,0px)}
html{height:100%}body{margin:0;padding:0;min-height:100%;background:var(--bg);font-family:'Inter',-apple-system,sans-serif;color:var(--text);overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch}
.app{max-width:600px;margin:0 auto;padding:16px 14px calc(var(--nav-h) + var(--safe-b) + 60px)}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.header h1{font-size:20px;font-weight:800;color:var(--green);margin:0}
.header .subtitle{font-size:11px;color:var(--muted);margin:0}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:90}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;padding:0;transition:color .15s;min-height:44px}
.bnav-btn.active{color:var(--green)}
.bnav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bnav-btn span{font-size:10px;font-weight:600}

/* SECTIONS */
.section{display:none}.section.active{display:block}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:0 0 10px}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-grid.three{grid-template-columns:1fr 1fr 1fr}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.stat-label{font-size:11px;color:var(--muted);font-weight:500;margin:0 0 3px}
.stat-value{font-size:20px;font-weight:700;color:var(--text);margin:0;line-height:1.2}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.amber{color:var(--amber)}.stat-value.blue{color:var(--blue)}

/* FILTER ROW */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filter-row label{font-size:12px;color:var(--muted);font-weight:500}
select{background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;-webkit-appearance:none;min-height:36px}

/* BADGES */
.badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;line-height:1.4}
.badge.ok{background:#1a3320;color:var(--green)}
.badge.warn{background:#3d2e0a;color:var(--amber)}
.badge.err{background:#3d1e1e;color:var(--red)}
.badge.info{background:#0e2535;color:var(--blue)}
.badge.muted{background:var(--bg3);color:var(--muted)}

/* BUTTONS */
.btn{background:var(--bg2);border:1px solid var(--border2);color:var(--green2);padding:10px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn.primary{background:var(--green3);border-color:var(--green3);color:#fff}
.btn.danger{background:#3d1e1e;border-color:var(--red);color:var(--red)}
.btn.small{padding:7px 12px;font-size:12px;min-height:36px}
.btn.full{width:100%}

/* UPLOAD */
.upload-area{border:2px dashed var(--border2);border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:14px;min-height:44px}
.upload-area.drag{border-color:var(--green);background:var(--bg2)}
.upload-area input{display:none}
.upload-icon{font-size:36px;margin-bottom:8px}
.upload-text{font-size:15px;color:var(--text3);margin:0 0 4px;font-weight:500}
.upload-sub{font-size:12px;color:var(--muted)}

/* POSITION BARS */
.pos-bar{display:flex;flex-direction:column;gap:8px}
.pos-row{display:grid;grid-template-columns:36px 1fr 60px;gap:8px;align-items:center}
.pos-name{color:var(--text3);font-weight:700;font-size:12px}
.pos-bar-track{background:var(--bg3);border-radius:4px;height:16px;overflow:hidden}
.pos-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.pos-bb{text-align:right;font-weight:700;font-size:12px}

/* HAND CARDS (replaces table) */
.hand-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;-webkit-user-select:none}
.hand-card:active{border-color:var(--green)}
.hand-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.hand-cards-display{font-size:17px;font-weight:700;color:var(--text)}
.hand-net{font-size:17px;font-weight:700}
.hand-card-mid{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.hand-card-bot{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.hand-meta{font-size:11px;color:var(--muted)}

/* PROGRESS */
.progress-bar{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .5s ease}

/* PAGINATION */
.pagination{display:flex;gap:8px;align-items:center;margin-top:14px;justify-content:center}
.page-info{font-size:12px;color:var(--muted)}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--green);color:var(--green);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:150;padding:0}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px 18px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-b))}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal h3{margin:0 0 14px;color:var(--green);font-size:17px;font-weight:700}
.modal-close{float:right;background:var(--bg3);border:none;color:var(--muted);font-size:16px;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-4px}
.issue-list{list-style:none;padding:0;margin:0}
.issue-list li{padding:12px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.65}
.issue-list li:last-child{border-bottom:none}
.issue-list li strong{color:var(--amber);display:block;margin-bottom:4px;font-size:14px}

/* STATUS ROW */
.status-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

/* MISTAKE CARD */
.mistake-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.mistake-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.mistake-title{font-size:15px;font-weight:700;color:var(--text);margin:0 0 3px}
.mistake-sub{font-size:12px;color:var(--text3);margin:0}
.mistake-explain{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--text3);line-height:1.65}
.mistake-hand-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bg3)}
.mistake-hand-row:last-child{border-bottom:none}

/* SESSION ITEM */
.session-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.session-item:last-child{border-bottom:none}
.session-name{font-size:13px;color:var(--text2);font-weight:500;word-break:break-all}
.session-meta{font-size:11px;color:var(--muted);margin-top:2px}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty p{font-size:14px;margin:0}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>🃏 Poker Tracker</h1>
      <p class="subtitle">Hardin TAG · NL25 6-max</p>
    </div>
    <div id="hand-count-badge" style="text-align:right">
      <p style="font-size:20px;font-weight:800;color:var(--green);margin:0" id="total-hands-header">—</p>
      <p style="font-size:10px;color:var(--muted);margin:0">hands</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="section active" id="tab-dashboard">
    <div class="filter-row">
      <select id="dash-filter" onchange="renderDashboard()">
        <option value="all">All time</option>
        <option value="may">May 2026</option>
        <option value="june">June 2026</option>
        <option value="last7">Last 7 days</option>
        <option value="last30">Last 30 days</option>
        <option value="last3s">Last 3 sessions</option>
        <option value="last5s">Last 5 sessions</option>
        <option value="last10s">Last 10 sessions</option>
        <option value="date">Date range...</option>
      </select>
      <input type="date" id="dash-date-from" title="From" style="display:none;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit" onchange="renderDashboard()"><input type="date" id="dash-date-to" title="To" style="display:none;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit" onchange="renderDashboard()">
      <select id="dash-stakes" onchange="renderDashboard()">
        <option value="all">All stakes</option>
        <option value="NL25">NL25</option>
        <option value="NL10">NL10</option>
      </select>
      <select id="dash-type" onchange="renderDashboard()">
        <option value="all">All formats</option>
        <option value="Regular">Regular</option>
        <option value="Rush&Cash">Rush &amp; Cash</option>
      </select>
    </div>
    <div class="stat-grid" id="dash-stats"></div>
    <div class="card">
      <div class="card-title">Position P&L (BB)</div>
      <div class="pos-bar" id="dash-positions"></div>
    </div>
    <div class="card">
      <div class="card-title">Top TAG violations</div>
      <div id="dash-violations"></div>
    </div>
    <div class="card">
      <div class="card-title">Sessions &amp; stakes</div>
      <div id="dash-sessions"></div>
      <div id="dash-stakes-breakdown" style="margin-top:10px"></div>
    </div>
  </div>

  <!-- UPLOAD -->
  <div class="section" id="tab-upload">
    <div class="card">
      <div class="card-title">Upload GGPoker hand history</div>
      <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept=".txt" multiple onchange="handleFiles(this.files)"/>
        <div class="upload-icon">📂</div>
        <p class="upload-text">Tap to select .txt files</p>
        <p class="upload-sub">Multiple files supported · GGPoker NLH format</p>
      </div>
      <div id="upload-status"></div>
    </div>
    <div class="card">
      <div class="status-row">
        <div class="card-title" style="margin:0">Stored sessions</div>
        <button class="btn danger small" onclick="clearAllData()">Clear all</button>
      </div>
      <div id="stored-sessions"></div>
    </div>
  </div>

  <!-- HAND REVIEW -->
  <div class="section" id="tab-hands">
    <div class="filter-row">
      <select id="hands-filter" onchange="renderHands()">
        <option value="all">All time</option>
        <option value="may">May 2026</option>
        <option value="june">June 2026</option>
        <option value="last7">Last 7 days</option>
        <option value="last30">Last 30 days</option>
        <option value="last3s">Last 3 sessions</option>
        <option value="last5s">Last 5 sessions</option>
        <option value="last10s">Last 10 sessions</option>
        <option value="date">Date range...</option>
      </select>
      <input type="date" id="hands-date-from" title="From" style="display:none;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit" onchange="renderHands()"><input type="date" id="hands-date-to" title="To" style="display:none;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit" onchange="renderHands()">
      <select id="hands-stakes" onchange="renderHands()">
        <option value="all">All stakes</option>
        <option value="NL25">NL25</option>
        <option value="NL10">NL10</option>
      </select>
      <select id="hands-show" onchange="renderHands()">
        <option value="all">All hands</option>
        <option value="mistakes">Mistakes only</option>
        <option value="losses">Biggest losses</option>
        <option value="played">Played (VPIP)</option>
      </select>
      <select id="hands-pos" onchange="renderHands()">
        <option value="all">All positions</option>
        <option value="BTN">BTN</option>
        <option value="CO">CO</option>
        <option value="HJ">HJ</option>
        <option value="UTG">UTG</option>
        <option value="SB">SB</option>
        <option value="BB">BB</option>
      </select>
    </div>
    <div id="hands-list"></div>
    <div class="pagination" id="hands-pagination"></div>
  </div>

  <!-- POSITIONS -->
  <div class="section" id="tab-positions">
    <div class="filter-row">
      <select id="pos-filter" onchange="renderPositions()">
        <option value="all">All time</option>
        <option value="may">May 2026</option>
        <option value="june">June 2026</option>
        <option value="last7">Last 7 days</option>
        <option value="last30">Last 30 days</option>
        <option value="last3s">Last 3 sessions</option>
        <option value="last5s">Last 5 sessions</option>
        <option value="last10s">Last 10 sessions</option>
        <option value="date">Date range...</option>
      </select>
      <input type="date" id="pos-date-from" title="From" style="display:none;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit" onchange="renderPositions()"><input type="date" id="pos-date-to" title="To" style="display:none;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit" onchange="renderPositions()">
      <select id="pos-stakes" onchange="renderPositions()">
        <option value="all">All stakes</option>
        <option value="NL25">NL25</option>
        <option value="NL10">NL10</option>
      </select>
    </div>
    <div id="pos-detail-grid"></div>
  </div>

  <!-- MISTAKES -->
  <div class="section" id="tab-mistakes">
    <div class="filter-row">
      <select id="mistakes-filter" onchange="renderMistakes()">
        <option value="all">All time</option>
        <option value="may">May 2026</option>
        <option value="june">June 2026</option>
        <option value="last7">Last 7 days</option>
        <option value="last30">Last 30 days</option>
        <option value="last3s">Last 3 sessions</option>
        <option value="last5s">Last 5 sessions</option>
        <option value="last10s">Last 10 sessions</option>
        <option value="date">Date range...</option>
      </select>
      <input type="date" id="mistakes-date-from" title="From" style="display:none;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit" onchange="renderMistakes()"><input type="date" id="mistakes-date-to" title="To" style="display:none;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit" onchange="renderMistakes()">
      <select id="mistakes-stakes" onchange="renderMistakes()">
        <option value="all">All stakes</option>
        <option value="NL25">NL25</option>
        <option value="NL10">NL10</option>
      </select>
      <select id="mistakes-type" onchange="renderMistakes()">
        <option value="all">All mistakes</option>
        <option value="preflop">Preflop only</option>
        <option value="postflop">Postflop only</option>
      </select>
    </div>
    <div class="stat-grid" id="mistakes-summary"></div>
    <div id="mistakes-list"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav-btn active" onclick="switchTab('dashboard',this)" id="bnav-dashboard">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Dashboard</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('upload',this)" id="bnav-upload">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <span>Upload</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('hands',this)" id="bnav-hands">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    <span>Hands</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('positions',this)" id="bnav-positions">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>Positions</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('mistakes',this)" id="bnav-mistakes">
    <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span>Mistakes</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('analysis',this)" id="bnav-analysis">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>Analysis</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('starting',this)" id="bnav-starting">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="14" height="18" rx="2"/><path d="M16 8h4"/><path d="M16 12h4"/><path d="M16 16h4"/><line x1="6" y1="8" x2="10" y2="8"/><line x1="6" y1="12" x2="10" y2="12"/></svg>
    <span>Hands</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('grid',this)" id="bnav-grid">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="4" height="4" rx="0.5"/><rect x="10" y="3" width="4" height="4" rx="0.5"/><rect x="17" y="3" width="4" height="4" rx="0.5"/><rect x="3" y="10" width="4" height="4" rx="0.5"/><rect x="10" y="10" width="4" height="4" rx="0.5"/><rect x="17" y="10" width="4" height="4" rx="0.5"/><rect x="3" y="17" width="4" height="4" rx="0.5"/><rect x="10" y="17" width="4" height="4" rx="0.5"/><rect x="17" y="17" width="4" height="4" rx="0.5"/></svg>
    <span>Grid</span>
  </button>
</nav>

  <!-- ANALYSIS -->
  <div class="section" id="tab-analysis">
    <div class="filter-row">
      <select id="analysis-filter" onchange="renderAnalysis()">
        <option value="all">All time</option>
        <option value="may">May 2026</option>
        <option value="june">June 2026</option>
        <option value="last7">Last 7 days</option>
        <option value="last30">Last 30 days</option>
        <option value="last3s">Last 3 sessions</option>
        <option value="last5s">Last 5 sessions</option>
        <option value="last10s">Last 10 sessions</option>

// ─── GITHUB STORAGE ───────────────────────────────────────────
async function loadFromGitHub() {
  try {
    // Step 1: get the latest tree SHA (not CDN-cached, always fresh)
    const refR = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/git/refs/heads/main`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const refData = await refR.json();
    const commitSha = refData.object.sha;

    // Step 2: get blob SHA for our file from the commit tree
    const commitR = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/git/commits/${commitSha}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const commitData = await commitR.json();
    const treeSha = commitData.tree.sha;

    // Step 3: fetch blob directly — bypasses CDN entirely
    const treeR = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/git/trees/${treeSha}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const treeData = await treeR.json();
    const blob = treeData.tree.find(f => f.path === GITHUB_FILE);
    if (!blob) return [];

    // Step 4: fetch the actual blob content
    const blobR = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/git/blobs/${blob.sha}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const blobData = await blobR.json();
    // Large files use truncated=true — use raw URL with blob SHA as cache key
    if (blobData.truncated || !blobData.content) {
      const rawR = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/main/${GITHUB_FILE}?blob=${blob.sha}`);
      const content = await rawR.json();
      return Array.isArray(content) ? content : [];
    }
    const content = JSON.parse(atob(blobData.content.replace(/\n/g, '')));
    return Array.isArray(content) ? content : [];
  } catch(e) { console.error('Load error:', e); return []; }
}

async function saveToGitHub(hands) {
  try {
    let sha = null;
    const check = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (check.ok) { const d = await check.json(); sha = d.sha; }
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(hands))));
    const body = { message: `Update tracker data – ${new Date().toISOString().slice(0,10)}`, content };
    if (sha) body.sha = sha;
    const r = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
      method: 'PUT', headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return r.ok;
  } catch(e) { console.error('Save error:', e); return false; }
}

// ─── PARSER ───────────────────────────────────────────────────
function getPosition(heroSeat, btnSeat, seatList) {
  const sorted = [...seatList].sort((a,b)=>a-b);
  const n = sorted.length;
  if (!n || !sorted.includes(heroSeat)) return 'UNKNOWN';
  const btnIdx = sorted.indexOf(btnSeat);
  const heroIdx = sorted.indexOf(heroSeat);
  const steps = (heroIdx - btnIdx + n) % n;
  const maps = {
    6:{0:'BTN',1:'SB',2:'BB',3:'UTG',4:'HJ',5:'CO'},
    5:{0:'BTN',1:'SB',2:'BB',3:'UTG',4:'HJ'},
    4:{0:'BTN',1:'SB',2:'BB',3:'UTG'},
    3:{0:'BTN',1:'SB',2:'BB'},
    2:{0:'BTN/SB',1:'BB'}
  };
  return (maps[n]||{})[steps] || `P${steps}`;
}

function classifyHand(cards) {
  if (!cards || cards.length < 2) return {cat:'N/A', notation:'', quality:'Unknown'};
  const ranks = {A:14,K:13,Q:12,J:11,T:10,9:9,8:8,7:7,6:6,5:5,4:4,3:3,2:2};
  const rn = r => ({14:'A',13:'K',12:'Q',11:'J',10:'T'}[r]||String(r));
  const c = cards.split(' ');
  if (c.length < 2) return {cat:'N/A', notation:'', quality:'Unknown'};
  const r1=ranks[c[0][0]]||0, r2=ranks[c[1][0]]||0;
  const suited=c[0][1]===c[1][1], hi=Math.max(r1,r2), lo=Math.min(r1,r2);
  let cat, notation;
  if (r1===r2) {
    notation=`${rn(hi)}${rn(hi)}`;
    cat=hi>=10?'Premium Pair':hi>=7?'Mid Pair':'Low Pair';
  } else {
    notation=`${rn(hi)}${rn(lo)}${suited?'s':'o'}`;
    if (hi===14&&lo>=10) cat='Premium';
    else if (hi===14&&lo>=7) cat='Strong Ace';
    else if (hi===14&&suited) cat='Strong Ace';  // suited aces (A2s-A6s) always playable
    else if (hi===14) cat='Weak Ace';
    else if (hi>=12&&lo>=10) cat='Broadway';
    else if (hi===13&&lo>=10) cat='Broadway';
    else if (suited&&(hi-lo<=2)&&lo>=6) cat='Suited Connector';
    else if (suited&&hi>=12) cat='Suited Broadway';
    else if (suited) cat='Suited Trash';
    else cat='Trash';
  }
  // Quality based on actual Hardin ranges
  const earlyMust = new Set([...(HARDIN_RANGES.UTG?.must||[]),...(HARDIN_RANGES.HJ?.must||[])]);
  const anyMust = new Set(Object.values(HARDIN_RANGES).flatMap(r=>r.must||[]));
  const anyAll = new Set(Object.values(HARDIN_RANGES).flatMap(r=>r.all||[]));
  const quality = earlyMust.has(notation) ? 'A-Range' : anyAll.has(notation) ? 'B-Range' : 'Outside';
  return {cat, notation, quality};
}

function extractStreetActions(raw) {
  const streets = {};
  const parts = raw.split(/\*\*\* (?:FIRST )?(?:FLOP|TURN|RIVER) \*\*\*[^\n]*\n/);
  const headers = [...raw.matchAll(/\*\*\* ((?:FIRST )?FLOP|TURN|RIVER) \*\*\* (\[[^\]]+\])?/g)];
  const pfStart = raw.indexOf('*** HOLE CARDS ***');
  const pfEnd = raw.search(/\*\*\* (?:FLOP|FIRST FLOP) \*\*\*/);
  const pfBlock = pfStart >= 0 ? raw.slice(pfStart, pfEnd > 0 ? pfEnd : undefined) : '';
  streets.preflop = {board:'', actions:[...pfBlock.matchAll(/(\w+): (raises \$[\d.]+ to \$[\d.]+|calls \$[\d.]+|folds|checks|bets \$[\d.]+)/g)].map(m=>({player:m[1],action:m[2]}))};
  headers.forEach((hdr,i) => {
    const sname = hdr[1].replace('FIRST ','').toLowerCase();
    const board = hdr[2]||'';
    const block = parts[i+1]||'';
    streets[sname] = {board, actions:[...block.matchAll(/(\w+): (raises \$[\d.]+ to \$[\d.]+|calls \$[\d.]+|folds|checks|bets \$[\d.]+)/g)].map(m=>({player:m[1],action:m[2]}))};
  });
  return streets;
}

function parseHands(text, filename) {
  const rawHands = text.split(/\n\n(?=Poker Hand #)/);
  const hands = [];
  const isMini = filename.includes('0.05') || filename.includes('RushAndCash') && !filename.includes('0.1 - 0.25');
  const fileBB = (filename.includes('0.05 - 0.1') || filename.includes('0.05-0.1')) ? 0.10 : 0.25;
  const fileStakes = fileBB===0.10 ? 'NL10' : 'NL25';
  const fileGameType = filename.includes('Rush') ? 'Rush&Cash' : 'Regular';

  for (const raw of rawHands) {
    if (!raw.trim() || !raw.includes('Hero')) continue;
    const h = {};
    const mid = raw.match(/Poker Hand #(\w+):/); if (!mid) continue;
    h.id = mid[1];
    h.filename = filename;
    h.stakes = fileStakes;
    h.gameType = fileGameType;
    const dm = raw.match(/- (\d{4}\/\d{2}\/\d{2} \d{2}:\d{2}:\d{2})/);
    h.date = dm ? dm[1].slice(0,10) : '';
    h.time = dm ? dm[1].slice(11) : '';
    const tm = raw.match(/Table '(\w+)'/); h.table = tm ? tm[1] : '';
    const bm = raw.match(/Seat #(\d+) is the button/); const btnSeat = bm ? parseInt(bm[1]) : 0;
    const seats = [...raw.matchAll(/Seat (\d+): (\w+) \(\$([\d.]+) in chips\)/g)];
    const seatMap = {}; seats.forEach(s=>seatMap[parseInt(s[1])]=s[2]);
    const seatNums = Object.keys(seatMap).map(Number);
    const heroSeat = seatNums.find(n=>seatMap[n]==='Hero'); if (!heroSeat) continue;
    h.position = getPosition(heroSeat, btnSeat, seatNums);
    h.numPlayers = seatNums.length;
    // Build seat→position map for villain labeling in review
    const seatPosMap = {};
    seatNums.forEach(sn => { seatPosMap[seatMap[sn]] = getPosition(sn, btnSeat, seatNums); });
    h.seatPositions = seatPosMap;
    const sm = raw.match(new RegExp(`Seat ${heroSeat}: Hero \\(\\$([\\.\\d]+) in chips\\)`));
    h.stackStart = sm ? parseFloat(sm[1]) : 25;
    const hcm = raw.match(/Dealt to Hero \[([^\]]+)\]/); h.holeCards = hcm ? hcm[1] : '';
    const {cat,notation,quality} = classifyHand(h.holeCards);
    h.handCat = cat; h.handNotation = notation; h.tagQuality = quality;
    const summ = raw.match(/\*\*\* SUMMARY \*\*\*([\s\S]*)/);
    const summText = summ ? summ[1] : '';
    h.inSB = /small blind/.test(summText.match(new RegExp(`Seat ${heroSeat}.*`))?.[0]||'');
    h.inBB = /big blind/.test(summText.match(new RegExp(`Seat ${heroSeat}.*`))?.[0]||'');
    const pfEnd = raw.search(/\*\*\* (?:FLOP|FIRST FLOP) \*\*\*/);
    const pfText = pfEnd > 0 ? raw.slice(0,pfEnd) : raw;
    const heroPF = [...pfText.matchAll(/Hero: (calls|raises|bets|checks|folds)/g)].map(m=>m[1]);
    h.vpip = heroPF.some(a=>['calls','raises'].includes(a)) ? 1 : 0;
    h.pfr = heroPF.includes('raises') ? 1 : 0;
    // Did someone else raise before Hero acted preflop?
    const otherRaisers = [...pfText.matchAll(/^(\w+): raises/gm)].filter(m=>m[1]!=='Hero');
    h.facedRaise = otherRaisers.length > 0 ? 1 : 0;
    // pfAction = last voluntary action (calls overrides raises for 3bet-then-call-4bet spots)
    if (heroPF.includes('calls')) h.pfAction='CALL';
    else if (h.pfr) h.pfAction='RAISE';
    else if (h.inBB && heroPF.includes('checks')) h.pfAction='CHECK_BB';
    else h.pfAction='FOLD';
    // streetReached = last street where Hero was still active (folded hands = Preflop)
    if (h.pfAction === 'FOLD') {
      h.streetReached = 'Preflop';
    } else {
      // Check if Hero has actions on each street
      const rawAfterPF = raw.slice(raw.search(/\*\*\* (?:FLOP|FIRST FLOP|TURN|RIVER) \*\*\*/));
      const riverSection = raw.match(/\*\*\* RIVER \*\*\*[\s\S]*?(?=\*\*\*|$)/);
      const turnSection  = raw.match(/\*\*\* TURN \*\*\*[\s\S]*?(?=\*\*\* RIVER|\*\*\* SHOW|\*\*\* SUM|$)/);
      const flopSection  = raw.match(/\*\*\* (?:FIRST )?FLOP \*\*\*[\s\S]*?(?=\*\*\* TURN|\*\*\* SHOW|\*\*\* SUM|$)/);
      if (riverSection && /Hero:/.test(riverSection[0])) h.streetReached = 'River';
      else if (turnSection && /Hero:/.test(turnSection[0])) h.streetReached = 'Turn';
      else if (flopSection && /Hero:/.test(flopSection[0])) h.streetReached = 'Flop';
      else if (/\*\*\* (?:FLOP|FIRST FLOP) \*\*\*/.test(raw)) h.streetReached = 'Flop';
      else h.streetReached = 'Preflop';
    }
    h.sawFlop = h.streetReached !== 'Preflop' && h.pfAction !== 'FOLD' ? 1 : 0;
    h.showdown = /Hero: shows/.test(raw) ? 1 : 0;
    // Store villain showdown cards
    const villainShows = [...raw.matchAll(/(\w+): shows \[([^\]]+)\]/g)]
      .filter(m => m[1] !== 'Hero')
      .map(m => ({
        player: m[1],
        cards: m[2],
        pos: ''  // filled below
      }));
    h.villainShown = villainShows;
    // Collect winnings — GGPoker uses both "collected" and "won"
    const heroSummLine = summText.match(new RegExp(`Seat ${heroSeat}: Hero[^\n]*`))?.[0]||'';
    const collM = heroSummLine.match(/(?:collected|won) \(\$([\d.]+)\)/);
    const collected = collM ? parseFloat(collM[1]) : 0;
    // Contribution: raise "to Y" = total, subtract uncalled returns, blinds only if no raise
    const heroRaisesY = [...raw.matchAll(/Hero: raises \$[\d.]+ to \$([\d.]+)/g)].map(m=>parseFloat(m[1]));
    const heroCalls   = [...raw.matchAll(/Hero: calls \$([\d.]+)/g)].map(m=>parseFloat(m[1]));
    const heroBetsArr = [...raw.matchAll(/Hero: bets \$([\d.]+)/g)].map(m=>parseFloat(m[1]));
    const uncalledArr = [...raw.matchAll(/Uncalled bet \(\$([\d.]+)\) returned to Hero/g)].map(m=>parseFloat(m[1]));
    const sbPost = raw.match(/Hero: posts small blind \$([\d.]+)/);
    const bbPost = raw.match(/Hero: posts big blind \$([\d.]+)/);
    let contrib = heroRaisesY.reduce((s,v)=>s+v,0)
                + heroCalls.reduce((s,v)=>s+v,0)
                + heroBetsArr.reduce((s,v)=>s+v,0)
                - uncalledArr.reduce((s,v)=>s+v,0);
    if (!heroRaisesY.length) {
      if (h.inSB && sbPost) contrib += parseFloat(sbPost[1]);
      if (h.inBB && bbPost) contrib += parseFloat(bbPost[1]);
    }
    contrib = Math.max(0, Math.round(contrib*100)/100);
    h.netUSD = Math.round((collected-contrib)*100)/100;
    h.netBB = Math.round(h.netUSD/fileBB*100)/100;
    const fm = raw.match(/\*\*\* (?:FIRST )?FLOP \*\*\* \[([^\]]+)\]/);
    h.boardFlop = fm ? fm[1] : '';
    const tm2 = raw.match(/\*\*\* TURN \*\*\* \[[^\]]+\] \[([^\]]+)\]/);
    h.boardTurn = tm2 ? tm2[1] : '';
    const rm2 = raw.match(/\*\*\* RIVER \*\*\* \[[^\]]+\] \[([^\]]+)\]/);
    h.boardRiver = rm2 ? rm2[1] : '';
    // Street-by-street actions for review
    h.streetActions = extractStreetActions(raw);
    const pfRaiserM = pfText.match(/(?!Hero)(\w+): raises \$[\d.]+ to \$([\d.]+)/);
    h.pfRaiser = pfRaiserM ? pfRaiserM[1] : '';
    h.pfRaiseAmt = pfRaiserM ? pfRaiserM[2] : '';
    h.cbetOpp=0; h.cbetMade=0;
    if (h.pfr && h.sawFlop) {
      const fp = raw.split(/\*\*\* (?:FIRST )?FLOP \*\*\*[^\n]*\n/);
      if (fp.length>1) {
        const flopOnly = fp[1].split(/\*\*\* TURN \*\*\*/)[0];
        if (/Hero:/.test(flopOnly)) {
          // Only a c-bet opportunity if Hero acts FIRST on flop (not facing a bet already)
          // Check if first action in flop block is Hero's
          const firstActor = flopOnly.match(/(\w+):/);
          const heroActsFirst = firstActor && firstActor[1] === 'Hero';
          // Also exclude 3-bet pots where Hero called (villain is aggressor, not Hero)
          const calledThreeBet = h.facedRaise && /Hero: calls/.test(raw.split(/\*\*\* (?:FLOP|FIRST FLOP) \*\*\*/)[0]);
          if (heroActsFirst && !calledThreeBet) {
            h.cbetOpp=1;
            if (/Hero: bets/.test(flopOnly)) h.cbetMade=1;
          }
        }
      }
    }
    const issues = [];
    // VPIP_TRASH: played a hand not in any Hardin range for this position
    const posRangeCheck = HARDIN_RANGES[h.position];
    if (h.vpip && posRangeCheck && !posRangeCheck.all.includes(h.handNotation)) issues.push('VPIP_TRASH');
    // LIMP_OOP: called from SB facing a raise with a hand that should 3-bet or fold
    if (h.pfAction==='CALL' && h.position==='SB' && h.facedRaise && !h.pfr) issues.push('LIMP_OOP');
    // LIMP: limped from non-blind position with a raiseable hand
    if (h.pfAction==='CALL' && !h.inBB && !h.inSB && !h.facedRaise) {
      const limpRange = HARDIN_RANGES[h.position];
      if (limpRange && limpRange.all.includes(h.handNotation)) issues.push('LIMP');
    }
    // CALL_WEAK: cold-called a raise with a hand outside Hardin's range (not already flagged as VPIP_TRASH)
    if (h.pfAction==='CALL' && !h.pfr && !h.inBB && h.facedRaise && !issues.includes('VPIP_TRASH')) {
      const callRange = HARDIN_RANGES[h.position];
      if (!callRange || !callRange.all.includes(h.handNotation)) issues.push('CALL_WEAK');
    }
    if (h.cbetOpp && !h.cbetMade) issues.push('MISSED_CBET');
    // CALL_4BET: Hero 3-bet, faced a 4-bet, called with hand outside continue range
    if (h.pfr && h.facedRaise && h.pfAction==='CALL') {
      // Check if there were 2 raises before Hero's call (Hero raised, villain re-raised = 4-bet)
      const preFlopRaises = (h.streetActions?.preflop?.actions||[]).filter(a=>a.action&&a.action.startsWith('raises'));
      const heroRaiseIdx = preFlopRaises.findIndex(a=>a.player==='Hero');
      const villainRaisedAfterHero = heroRaiseIdx>=0 && preFlopRaises.slice(heroRaiseIdx+1).some(a=>a.player!=='Hero');
      if (villainRaisedAfterHero) {
        const continueRange = CONTINUE_VS_4BET[h.position] || [];
        if (!continueRange.includes(h.handNotation)) issues.push('CALL_4BET');
      }
    }
    // FOLD_STRONG_LP: folded a must-raise hand in a true RFI spot (no prior raise)
    // If someone already raised, folding is often correct — different range applies
    const foldPosRange = HARDIN_RANGES[h.position];
    if (h.pfAction==='FOLD' && !h.facedRaise && foldPosRange && foldPosRange.must.includes(h.handNotation)) issues.push('FOLD_STRONG_LP');
    h.tagIssues = issues;
    h.tagCompliant = issues.length===0 ? 1 : 0;
    const reviews = [];
    if (h.netBB < -10) reviews.push('BIG_LOSS');
    if (h.sawFlop && ['Turn','River'].includes(h.streetReached)) reviews.push('POSTFLOP');
    if (h.showdown) reviews.push('SHOWDOWN');
    h.reviewFlags = reviews;
    h.isPreflop = issues.some(i=>['VPIP_TRASH','LIMP_OOP','CALL_WEAK','FOLD_STRONG_LP'].includes(i));
    h.isPostflop = issues.some(i=>['MISSED_CBET'].includes(i)) || h.reviewFlags.includes('POSTFLOP');
    hands.push(h);
  }
  return hands;
}

// ─── CARD FORMATTER ──────────────────────────────────────────
function formatCards(cards) {
  if (!cards) return '??';
  const suitMap = {'s':'♠','h':'♥','d':'♦','c':'♣'};
  const suitColor = {'s':'var(--text)','h':'var(--red)','d':'var(--red)','c':'var(--text)'};
  return cards.split(' ').map(c => {
    if (c.length < 2) return c;
    const rank = c.slice(0,-1);
    const suit = c.slice(-1).toLowerCase();
    const sym = suitMap[suit] || suit;
    const col = suitColor[suit] || 'var(--text)';
    return `<span style="color:${col}">${rank}${sym}</span>`;
  }).join(' ');
}

// ─── FILTER UTILITY ───────────────────────────────────────────
function filterByTime(hands, tf, dateInputId) {
  if (tf==='all') return hands;
  if (tf==='may') return hands.filter(function(h){return h.date.startsWith('2026/05');});
  if (tf==='june') return hands.filter(function(h){return h.date.startsWith('2026/06');});
  if (tf==='last7') {
    var d=new Date(); d.setDate(d.getDate()-7);
    return hands.filter(function(h){return new Date(h.date.split('/').join('-'))>=d;});
  }
  if (tf==='last30') {
    var d=new Date(); d.setDate(d.getDate()-30);
    return hands.filter(function(h){return new Date(h.date.split('/').join('-'))>=d;});
  }
  if (tf==='last3s'||tf==='last5s'||tf==='last10s') {
    var n = tf==='last3s'?3:tf==='last5s'?5:10;
    var sessions = buildSessions(allHands);
    sessions.sort(function(a,b){return b.start-a.start;});
    var lastN = sessions.slice(0,n);
    var fileSet = {};
    lastN.forEach(function(s){s.fileList.forEach(function(f){fileSet[f]=true;});});
    return hands.filter(function(h){return fileSet[h.filename];});
  }
  if (tf==='date' && dateInputId) {
    var elF=document.getElementById(dateInputId+'-from');
    var elT=document.getElementById(dateInputId+'-to');
    if (elF) elF.style.display='inline-block';
    if (elT) elT.style.display='inline-block';
    var from=elF&&elF.value?elF.value.split('-').join('/'):'';
    var to=elT&&elT.value?elT.value.split('-').join('/'):'';
    if (!from && !to) return hands;
    return hands.filter(function(h){
      if (from && h.date < from) return false;
      if (to && h.date > to) return false;
      return true;
    });
  }
  if (dateInputId) {
    var eF=document.getElementById(dateInputId+'-from');
    var eT=document.getElementById(dateInputId+'-to');
    if (eF) eF.style.display='none';
    if (eT) eT.style.display='none';
  }
  return hands;
}

function filterHands(hands, tf, stakes, gameType, dateInputId) {
  let h = filterByTime(hands, tf, dateInputId);
  if (stakes && stakes!=='all') h = h.filter(x=>x.stakes===stakes);
  if (gameType && gameType!=='all') h = h.filter(x=>x.gameType===gameType);
  return h;
}

  const netUSDabs = Math.abs(netUSDval).toFixed(2);

  document.getElementById('dash-stats').innerHTML = `

    <div class="stat"><p class="stat-label">Duration</p><p class="stat-value blue" style="font-size:16px">${durStr}</p></div>
    <div class="stat"><p class="stat-label">TAG compliance</p><p class="stat-value ${compliance>=80?'green':compliance>=60?'amber':'red'}">${compliance}%</p></div>
    <div class="stat"><p class="stat-label">Big losses (&gt;10bb)</p><p class="stat-value ${bigLosses?'red':''}">${bigLosses}</p></div>
  `;
  // Positions
  const positions = ['BTN','CO','HJ','UTG','SB','BB'];
  const posData = positions.map(p=>({p, hands:hands.filter(h=>h.position===p), net:hands.filter(h=>h.position===p).reduce((s,h)=>s+h.netBB,0)}));
  const maxAbs = Math.max(...posData.map(d=>Math.abs(d.net)),1);
  document.getElementById('dash-positions').innerHTML = posData.map(d=>{

  // Violations

  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  document.getElementById('dash-violations').innerHTML = sorted.length
    ? sorted.map(([k,v])=>`

    </div>`;

// ─── UPLOAD ───────────────────────────────────────────────────
async function handleFiles(files) {
  const status = document.getElementById('upload-status');
  status.innerHTML = '<p style="color:#d4a847;font-size:13px;margin:8px 0">⏳ Parsing files...</p>';
  let added = 0;
  const existingIds = new Set(allHands.map(h=>h.id));
  for (const file of files) {
    const text = await file.text();
    const parsed = parseHands(text, file.name);
    const newHands = parsed.filter(h=>!existingIds.has(h.id));
    newHands.forEach(h=>existingIds.add(h.id));
    allHands = [...allHands, ...newHands];
    added += newHands.length;
  }
  status.innerHTML = `<p style="color:#6db87a;font-size:13px;margin:8px 0">✓ Added ${added} new hands · Saving to GitHub...</p>`;
  const saved = await saveToGitHub(allHands);
  status.innerHTML = saved
    ? `<p style="color:#6db87a;font-size:13px;margin:8px 0">✓ ${added} hands added · Saved to GitHub successfully</p>
       <p style="color:#d4a847;font-size:12px;margin:6px 0 0">📊 Reminder: log your Fish Buffet balance in your G-Sheet — our net figures exclude rakeback (~$7 per 500 hands).</p>`
    : `<p style="color:#d4a847;font-size:13px;margin:8px 0">⚠ ${added} hands added locally but GitHub save failed — check token</p>`;
  renderStoredSessions();
  renderDashboard();
}

function buildSessions(handsArr) {
  const fileSpans = {};
  handsArr.forEach(h => {
    if (!h.filename||!h.date||!h.time) return;
    const ts = new Date((h.date+' '+h.time).split('/').join('-')).getTime();
    if (!fileSpans[h.filename]) fileSpans[h.filename]=[ts,ts];
    else { fileSpans[h.filename][0]=Math.min(fileSpans[h.filename][0],ts); fileSpans[h.filename][1]=Math.max(fileSpans[h.filename][1],ts); }
  });
  const sorted = Object.entries(fileSpans).sort((a,b)=>a[1][0]-b[1][0]);
  const merged = [];
  for (const [fn,[s,e]] of sorted) {
    if (merged.length && s <= merged[merged.length-1].end + 300000) {
      merged[merged.length-1].end = Math.max(merged[merged.length-1].end, e);
      merged[merged.length-1].files.push(fn);
    } else { merged.push({start:s,end:e,files:[fn]}); }
  }
  return merged.map(sess => {
    const fset = new Set(sess.files);
    const sh = handsArr.filter(h=>fset.has(h.filename));
    const netBB = sh.reduce((s,h)=>s+h.netBB,0);
    const netUSD = sh.reduce((s,h)=>s+h.netBB*(h.stakes==='NL10'?0.10:0.25),0);
    const durMin = (sess.end-sess.start)/60000;
    const d = new Date(sess.start);
    const date = d.getFullYear()+'/'+(d.getMonth()+1+'').padStart(2,'0')+'/'+(''+d.getDate()).padStart(2,'0');
    return {date, durMin, hands:sh.length, netBB, netUSD, files:sess.files.length, start:sess.start, fileList:sess.files};
  });
}

function renderAction(player, action, seatPositions) {
  const isHero = player==='Hero';
  const col = isHero?'var(--green)':'var(--text3)';
  const pos = seatPositions && seatPositions[player] ? seatPositions[player] : null;
  const name = isHero ? 'Hero' : (pos ? `Villain (${pos})` : 'Villain');
  let verb = action;
  if (action==='folds') verb='<span style="color:var(--muted)">folds</span>';
  else if (action==='checks') verb='<span style="color:var(--blue)">checks</span>';
  else if (action.startsWith('calls')) verb=`<span style="color:var(--amber)">${action}</span>`;
  else if (action.startsWith('bets')||action.startsWith('raises')) verb=`<span style="color:var(--green)">${action}</span>`;
  return `<div style="display:flex;gap:8px;padding:4px 0;font-size:13px">
    <span style="font-weight:600;color:${col};min-width:80px">${name}</span>
    <span>${verb}</span>
  </div>`;
}

function showHandDetail(id) {
  const h = allHands.find(x=>x.id===id);
  if (!h) return;
  const issues = h.tagIssues;
  const bbCol = h.netBB>=0?'var(--green)':'var(--red)';

  // ── Header ──
  let body = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
    <div class="stat"><p class="stat-label">Cards</p><p class="stat-value" style="font-size:20px">${formatCards(h.holeCards)}</p></div>
    <div class="stat"><p class="stat-label">Result</p><p class="stat-value" style="font-size:20px;color:${bbCol}">${h.netBB>=0?'+':''}${h.netBB.toFixed(1)} BB</p></div>
    <div class="stat"><p class="stat-label">Position</p><p class="stat-value blue" style="font-size:16px">${h.position}</p></div>
    <div class="stat"><p class="stat-label">Hand type</p><p class="stat-value amber" style="font-size:13px">${h.handCat}<br/><span class="badge ${h.tagQuality==='A-Range'?'ok':h.tagQuality==='B-Range'?'warn':'err'}" style="margin-top:3px">${h.tagQuality}</span></p></div>
  </div>`;

  // ── Hand story — street by street ──
  const sa = h.streetActions || {};
  const streets = [
    {key:'preflop', label:'Preflop', board:''},
    {key:'flop', label:'Flop', board:h.boardFlop},
    {key:'turn', label:'Turn', board:h.boardTurn},
    {key:'river', label:'River', board:h.boardRiver},
  ];

  body += `<div class="card" style="margin-bottom:12px">`;
  body += `<div class="card-title">Hand story</div>`;

  // Show context: who raised preflop
  if (h.pfRaiser && h.pfRaiser!=='Hero') {
    body += `<p style="font-size:12px;color:var(--muted);margin:0 0 8px">Villain opened to $${h.pfRaiseAmt}</p>`;
  } else if (h.pfRaiser==='Hero') {
    body += `<p style="font-size:12px;color:var(--muted);margin:0 0 8px">Hero opened to $${h.pfRaiseAmt}</p>`;
  }

  // Only show streets up to and including the one where Hero was active
  const streetOrder = ['preflop','flop','turn','river'];
  const heroStreetIdx = streetOrder.indexOf((h.streetReached||'Preflop').toLowerCase());
  streets.forEach(({key,label,board}) => {
    const st = sa[key];
    if (!st && !board) return;
    const actions = st ? st.actions : [];
    // Stop at Hero's last active street
    if (streetOrder.indexOf(key) > heroStreetIdx) return;
    if (key!=='preflop' && !board) return;
    if (key==='preflop' && !actions.length) return;

    body += `<div style="margin-bottom:10px">`;
    body += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">${label}</span>
      ${board?`<span style="font-size:13px;font-weight:600;color:var(--text2)">${formatCards(board)}</span>`:''}
    </div>`;
    if (actions.length) {
      body += `<div style="background:var(--bg3);border-radius:6px;padding:6px 10px">`;
      actions.forEach(a => { body += renderAction(a.player||a[0], a.action||a[1], h.seatPositions); });
      body += `</div>`;
    }
    body += `</div>`;
  });
  body += `</div>`;

  // ── TAG verdict ──
  // Determine verdict tier
  const isShowdown = h.showdown;
  const bigLoss = h.netBB < -10;
  const sawPostflop = h.sawFlop && ['Turn','River'].includes(h.streetReached);
  let verdictTier, verdictColor, verdictText, verdictSub;
  if (!issues.length) {
    if (!sawPostflop && !isShowdown) {
      verdictTier='✓ Played correctly'; verdictColor='var(--green)';
      verdictText='Clean preflop decision per Hardin framework.';
      verdictSub='';
    } else if (isShowdown && bigLoss) {
      verdictTier='✓ No TAG violations — statistical variance'; verdictColor='var(--green)';
      verdictText='All decisions correct per Hardin. The loss is variance, not a mistake.';
      verdictSub='Big losses with no violations are coolers or bad beats — unavoidable in the long run.';
    } else if (sawPostflop) {
      verdictTier='✓ Correct — review postflop sizing'; verdictColor='var(--amber)';
      verdictText='No framework violations detected. Postflop sizing and line choices may still have room for improvement.';
      verdictSub='Consider: was your bet sizing appropriate? Did you take the most profitable line?';
    } else {
      verdictTier='✓ Played correctly'; verdictColor='var(--green)';
      verdictText=h.netBB<0?'Loss is variance — correct decisions.':'Well played.';
      verdictSub='';
    }
  }
  if (!issues.length) {
    body += `<div style="background:var(--bg3);border:1px solid ${verdictColor}40;border-radius:10px;padding:12px 14px;margin-bottom:12px">
      <p style="color:${verdictColor};font-size:14px;margin:0;font-weight:700">${verdictTier}</p>
      <p style="color:var(--text3);font-size:12px;margin:5px 0 0">${verdictText}</p>
      ${verdictSub?`<p style="color:var(--muted);font-size:11px;margin:4px 0 0;line-height:1.5">${verdictSub}</p>`:''}
    </div>`;
  } else {
    body += `<div class="card" style="border-color:#d96060;margin-bottom:12px"><div class="card-title" style="color:var(--red)">TAG violations</div>`;
    issues.forEach(issue => {
      const ex = ISSUE_EXPLAIN[issue];
      if (!ex) return;
      body += `<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <span style="font-size:14px;font-weight:700;color:var(--text)">${ex.label}</span>
          <span class="badge ${ex.type==='preflop'?'warn':'err'}">${ex.type}</span>
        </div>
        <p style="font-size:12px;color:var(--red);margin:0 0 6px;font-weight:600">${ex.short}</p>
        <p style="font-size:12px;color:var(--text3);margin:0;line-height:1.65">${ex.explain}</p>
      </div>`;
    });
    body += `</div>`;
  }

  // Villain showdown cards
  if (h.villainShown && h.villainShown.length) {
    body += `<div class="card" style="margin-bottom:12px"><div class="card-title">Showdown</div>`;
    h.villainShown.forEach(v => {
      const label = v.pos ? `Villain (${v.pos})` : 'Villain';
      body += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0">
        <span style="font-size:13px;color:var(--text3);font-weight:600">${label}</span>
        <span style="font-size:16px;font-weight:700">${formatCards(v.cards)}</span>
      </div>`;
    });
    body += `</div>`;
  }

  if (h.reviewFlags.includes('BIG_LOSS')) {
    body += `<div style="background:#3d1e1e;border-radius:8px;padding:10px 12px">
      <p style="color:var(--red);font-size:13px;margin:0;font-weight:600">⚠ Big loss — was this a cooler or a mistake?</p>
    </div>`;
  }

  document.getElementById('modal-title').textContent = `${formatCards(h.holeCards).replace(/<[^>]+>/g,'')} · ${h.position} · ${h.date.slice(5)}`;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').style.display = 'flex';
}

  const postMistakes = mistakeHands.filter(h=>h.tagIssues.some(i=>['MISSED_CBET'].includes(i)));
  document.getElementById('mistakes-summary').innerHTML = `
    <div class="stat"><p class="stat-label">Total mistakes</p><p class="stat-value red">${mistakeHands.length}</p></div>

  const issueGroups = {};

    }).join('');

function getHardinVerdict(notation, position, pfAction) {
  const posRange = HARDIN_RANGES[position];
  if (!posRange) return {verdict:'no-data', note:'Position not tracked.'};
  const inMust = posRange.must.includes(notation);
  const inOptional = posRange.optional.includes(notation);
  const inAll = posRange.all.includes(notation);

  if (pfAction === 'RAISE') {
    if (inAll) return {verdict:'correct', note:`${notation} is a raise from ${position} per Hardin.`};
    return {verdict:'too-loose', note:`${notation} is outside Hardin's opening range from ${position}.`};
  }
  if (pfAction === 'FOLD') {
    if (inMust) return {verdict:'should-raise', note:`${notation} is a must-raise from ${position}. Folding gives up steal equity and value.`};
    if (inOptional) return {verdict:'fold-ok-optional', note:`${notation} is optional from ${position}. Folding is acceptable but raising is also correct.`};
    return {verdict:'correct-fold', note:`${notation} is outside Hardin's range from ${position}. Fold is correct.`};
  }
  if (pfAction === 'CALL') {
    if (inMust || inOptional) return {verdict:'should-raise-not-call', note:`${notation} from ${position} should be raised, not called. Calling gives up fold equity and initiative.`};
    return {verdict:'ok', note:`Calling with ${notation} from ${position}.`};
  }
  return {verdict:'ok', note:''};
}

function renderStartingHands() {
  const tf = getEl('starting-filter');
  const sort = getEl('starting-sort');
  const catFilter = getEl('starting-cat');
  const hands = filterHands(allHands, tf, getEl('starting-stakes'), 'all', 'starting-date');

  // Group by hand notation
  const groups = {};
  hands.forEach(h=>{
    if (!h.handNotation) return;
    if (!groups[h.handNotation]) groups[h.handNotation]={
      notation:h.handNotation, cat:h.handCat, quality:h.tagQuality,
      hands:[], netBB:0, mistakes:0, correct:0
    };
    groups[h.handNotation].hands.push(h);
    groups[h.handNotation].netBB += h.netBB;
    if (h.tagIssues.length) groups[h.handNotation].mistakes++;
    else groups[h.handNotation].correct++;
  });

  let rows = Object.values(groups);
  if (catFilter!=='all') rows = rows.filter(r=>r.cat===catFilter);

  // Sort
  if (sort==='hands') rows.sort((a,b)=>b.hands.length-a.hands.length);
  else if (sort==='bb100') rows.sort((a,b)=>(b.netBB/b.hands.length)-(a.netBB/a.hands.length));
  else if (sort==='worst') rows.sort((a,b)=>(a.netBB/a.hands.length)-(b.netBB/b.hands.length));
  else if (sort==='netloss') rows.sort((a,b)=>a.netBB-b.netBB);

  // Summary stats
  const totalPlayed = Object.values(groups).reduce((s,g)=>s+g.hands.filter(h=>h.vpip).length,0);
  const bestHand = rows.filter(r=>r.hands.length>=3).sort((a,b)=>(b.netBB/b.hands.length)-(a.netBB/a.hands.length))[0];
  const worstHand = rows.filter(r=>r.hands.length>=3).sort((a,b)=>(a.netBB/a.hands.length)-(b.netBB/b.hands.length))[0];
  document.getElementById('starting-summary').innerHTML = `
    <div class="stat"><p class="stat-label">Hand types seen</p><p class="stat-value blue">${rows.length}</p></div>
    <div class="stat"><p class="stat-label">Hands played</p><p class="stat-value amber">${totalPlayed}</p></div>
    <div class="stat"><p class="stat-label">Best hand (3+ dealt)</p><p class="stat-value green" style="font-size:15px">${bestHand?bestHand.notation:'—'}</p></div>
    <div class="stat"><p class="stat-label">Worst hand (3+ dealt)</p><p class="stat-value red" style="font-size:15px">${worstHand?worstHand.notation:'—'}</p></div>
  `;

  const el = document.getElementById('starting-list');
  if (!rows.length) {
    el.innerHTML='<div class="empty"><div class="empty-icon">🃏</div><p>No hand data yet — upload sessions first</p></div>';
    return;
  }

  el.innerHTML = rows.map(g=>{
    const n = g.hands.length;
    const bb100 = n ? g.netBB/n*100 : 0;
    const bbCol = g.netBB>=0?'var(--green)':g.netBB<-5?'var(--red)':'var(--amber)';
    const b100Col = bb100>=0?'var(--green)':bb100<-50?'var(--red)':'var(--amber)';
    const qualBadge = g.quality==='A-Range'?'ok':g.quality==='B-Range'?'warn':'err';
    const hardinRule = HARDIN_ACTION[g.notation];
    const sampleWarn = n < 5 ? '<span class="badge warn" style="font-size:10px">small sample</span>' : '';

    // Check if any hands had position/action deviation
    const deviations = g.hands.filter(hh=>{
      if (!hh.vpip && !hh.pfr) return false;
      const v = getHardinVerdict(g.notation, hh.position, hh.pfAction);
      return ['should-raise','should-raise-not-call','too-loose'].includes(v.verdict);
    });

    return `<div class="hand-card" onclick="showStartingDetail('${g.notation}')">
      <div class="hand-card-top">
        <div>
          <span style="font-size:19px;font-weight:800;color:var(--text)">${g.notation}</span>
          <span style="font-size:11px;color:var(--muted);margin-left:8px">${g.cat}</span>
        </div>
        <div style="text-align:right">
          <div style="font-size:17px;font-weight:700;color:${bbCol}">${g.netBB>=0?'+':''}${g.netBB.toFixed(1)} BB</div>
          <div style="font-size:11px;color:${b100Col};font-weight:600">${bb100>=0?'+':''}${bb100.toFixed(0)}/100</div>
        </div>
      </div>
      <div class="hand-card-mid">
        <span class="badge ${qualBadge}">${g.quality}</span>
        <span class="badge muted">${n} dealt</span>
        ${deviations.length?`<span class="badge err">${deviations.length} deviation${deviations.length>1?'s':''}</span>`:''}
        ${sampleWarn}
      </div>
      <div class="hand-card-bot">
        <span class="hand-meta">${hardinRule?'Hardin: '+hardinRule.rfi:'Outside primary ranges'}</span>
        <span class="hand-meta">${g.mistakes} mistake${g.mistakes!==1?'s':''}</span>
      </div>
    </div>`;
  }).join('');
}

function showStartingDetail(notation) {
  const tf = document.getElementById('starting-filter').value;
  const hands = filterByTime(allHands, tf).filter(h=>h.handNotation===notation);
  if (!hands.length) return;
  const netBB = hands.reduce((s,h)=>s+h.netBB,0);
  const n = hands.length;
  const bb100 = netBB/n*100;
  const rule = HARDIN_ACTION[notation];
  const bbCol = netBB>=0?'var(--green)':'var(--red)';

  // Per-position breakdown
  const positions = ['BTN','CO','HJ','UTG','SB','BB'];
  const posBreakdown = positions.map(p=>{
    const ph = hands.filter(h=>h.position===p);
    if (!ph.length) return null;
    const pNet = ph.reduce((s,h)=>s+h.netBB,0);
    return {p, count:ph.length, net:pNet, bb100:pNet/ph.length*100};
  }).filter(Boolean);

  // Deviations
  const deviations = hands.map(hh=>{
    const v = getHardinVerdict(notation, hh.position, hh.pfAction);
    return {...hh, verdict:v};
  }).filter(hh=>['should-raise','should-raise-not-call','too-loose'].includes(hh.verdict.verdict));

  document.getElementById('modal-title').textContent = `${notation} analysis`;
  let body = `
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat"><p class="stat-label">Dealt</p><p class="stat-value blue">${n}</p></div>
      <div class="stat"><p class="stat-label">Net BB</p><p class="stat-value" style="color:${bbCol}">${netBB>=0?'+':''}${netBB.toFixed(1)}</p></div>
      <div class="stat"><p class="stat-label">BB/100</p><p class="stat-value" style="color:${bbCol}">${bb100>=0?'+':''}${bb100.toFixed(0)}</p></div>
      <div class="stat"><p class="stat-label">Mistakes</p><p class="stat-value ${hands.filter(h=>h.tagIssues.length).length?'red':''}">${hands.filter(h=>h.tagIssues.length).length}</p></div>
    </div>`;

  if (rule) {
    body += `<div style="background:var(--bg3);border-radius:10px;padding:12px 14px;margin-bottom:14px">
      <p style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 6px">Hardin framework</p>
      <p style="font-size:13px;color:var(--green2);margin:0 0 4px;font-weight:600">Raise from: ${rule.rfi}</p>
      <p style="font-size:13px;color:var(--text3);margin:0;line-height:1.6">${rule.note}</p>
    </div>`;
  } else {
    body += `<div style="background:#3d1e1e;border-radius:10px;padding:12px 14px;margin-bottom:14px">
      <p style="font-size:13px;color:var(--red);margin:0;font-weight:600">Outside Hardin primary ranges</p>
      <p style="font-size:12px;color:var(--text3);margin:4px 0 0">Playing this hand is likely a VPIP leak unless from BB defense.</p>
    </div>`;
  }

  if (posBreakdown.length) {
    body += `<p style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 8px">By position</p>`;
    body += posBreakdown.map(p=>{
      const col = p.net>=0?'var(--green)':'var(--red)';
      return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge info">${p.p}</span>
          <span style="font-size:12px;color:var(--muted)">${p.count} hand${p.count>1?'s':''}</span>
        </div>
        <div style="text-align:right">
          <span style="font-size:13px;font-weight:700;color:${col}">${p.net>=0?'+':''}${p.net.toFixed(1)} BB</span>
          <span style="font-size:11px;color:var(--muted);margin-left:6px">${p.bb100>=0?'+':''}${p.bb100.toFixed(0)}/100</span>
        </div>
      </div>`;
    }).join('');
    body += '<div style="margin-bottom:14px"></div>';
  }

  if (deviations.length) {
    body += `<p style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 8px">Hardin deviations</p>`;
    body += deviations.map(hh=>`
      <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <div><span class="badge info">${hh.position}</span> <span class="badge warn" style="margin-left:4px">${hh.pfAction}</span></div>
          <span style="font-size:13px;font-weight:700;color:${hh.netBB>=0?'var(--green)':'var(--red)'}">${hh.netBB>=0?'+':''}${hh.netBB.toFixed(1)} BB</span>
        </div>
        <p style="font-size:12px;color:var(--red);margin:0;font-weight:600">${hh.verdict.verdict.replace(/-/g,' ').toUpperCase()}</p>
        <p style="font-size:12px;color:var(--text3);margin:3px 0 0">${hh.verdict.note}</p>
      </div>`).join('');
  }

  if (n < 5) {
    body += `<div style="background:var(--bg3);border-radius:8px;padding:10px 12px;margin-top:10px">
      <p style="font-size:12px;color:var(--amber);margin:0">⚠ Small sample (${n} hands) — results are not statistically significant yet.</p>
    </div>`;
  }

  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').style.display = 'flex';
}

// ─── HAND COMBO GRID ─────────────────────────────────────────
function renderGrid() {
  const tf = getEl('grid-filter');
  const skEl = getEl('grid-stakes');
  const mtEl = getEl('grid-metric');
  let hands = filterHands(allHands, tf, skEl, 'all', 'grid-date');
  const metric = (mtEl && mtEl !== 'all') ? mtEl : 'net';
  const exBlindEl = document.getElementById('grid-exclude-blindfolds');
  if (exBlindEl && exBlindEl.checked) {
    hands = hands.filter(function(h){
      var blindFold = (h.position==='SB'||h.position==='BB') && (h.pfAction==='FOLD'||h.pfAction==='CHECK_BB');
      return !blindFold;
    });
  }
  const el = document.getElementById('grid-container');
  if (!hands.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🃏</div><p>No data yet</p></div>';
    return;
  }

  var RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];

  // Build lookup per notation
  var lookup = {};
  for (var hi = 0; hi < hands.length; hi++) {
    var h = hands[hi];
    var n = h.handNotation;
    if (!n) continue;
    if (!lookup[n]) lookup[n] = {net:0, netBB:0, count:0};
    var bbVal = h.stakes === 'NL10' ? 0.10 : 0.25;
    lookup[n].net += h.netBB * bbVal;
    lookup[n].netBB += h.netBB;
    lookup[n].count++;
  }

  var cellSize = Math.max(28, Math.min(42, Math.floor((Math.min(window.innerWidth, 560) - 20) / 14)));
  var fSize = Math.max(7, cellSize - 16);
  var vSize = Math.max(6, cellSize - 20);

  var rows = '';
  for (var i = 0; i < 13; i++) {
    var r1 = RANKS[i];
    var cols = '';
    for (var j = 0; j < 13; j++) {
      var r2 = RANKS[j];
      var notation;
      if (i === j) {
        notation = r1 + r1;
      } else if (i < j) {
        notation = r1 + r2 + 's';
      } else {
        notation = r2 + r1 + 'o';
      }
      var d = lookup[notation];
      var count = d ? d.count : 0;
      var bg, valStr;
      if (!count) {
        bg = '#1e2a1e';
        valStr = '';
      } else {
        var val = metric === 'bb100' ? d.netBB / count * 100 : metric === 'hands' ? count : d.net;
        var intensity;
        if (metric === 'hands') {
          bg = '#1a3a2a';
          valStr = count + 'x';
        } else if (val > 0) {
          intensity = Math.min(val / (metric === 'bb100' ? 80 : 3), 1);
          var g = Math.round(60 + intensity * 80);
          bg = 'rgb(20,' + g + ',20)';
          valStr = (metric === 'bb100' ? (val >= 0 ? '+' : '') + val.toFixed(0) : (val >= 0 ? '+' : '') + '$' + Math.abs(val).toFixed(2));
        } else if (val < 0) {
          intensity = Math.min(Math.abs(val) / (metric === 'bb100' ? 80 : 3), 1);
          var rr = Math.round(60 + intensity * 80);
          bg = 'rgb(' + rr + ',20,20)';
          valStr = (metric === 'bb100' ? val.toFixed(0) : '-$' + Math.abs(val).toFixed(2));
        } else {
          bg = '#2a2a2a';
          valStr = '0';
        }
      }
      cols += '<div onclick="showGridDetail(\'' + notation + '\')" style="width:' + cellSize + 'px;height:' + cellSize + 'px;background:' + bg + ';display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:2px;box-sizing:border-box">'
        + '<span style="font-size:' + fSize + 'px;font-weight:700;color:#e0ead8;line-height:1">' + notation + '</span>'
        + (valStr ? '<span style="font-size:' + vSize + 'px;color:#b0c8a8;line-height:1.2">' + valStr + '</span>' : '')
        + '</div>';
    }
    rows += '<div style="display:flex;gap:1px">' + cols + '</div>';
  }

  el.innerHTML = '<div style="display:flex;flex-direction:column;gap:1px">' + rows + '</div>';
}

function showViolationHands(issue) {
  var tf = getEl('analysis-filter');
  var hands = filterHands(allHands, tf, getEl('analysis-stakes'), 'all', 'analysis-date')
    .filter(function(h){ return h.tagIssues.indexOf(issue) !== -1; });
  if (!hands.length) { showToast('No hands'); return; }
  var ex = ISSUE_EXPLAIN[issue] || {};
  var net = hands.reduce(function(s,h){return s+h.netBB;},0);
  var bbCol = net>=0?'var(--green)':'var(--red)';

  hands.sort(function(a,b){return a.netBB-b.netBB;});

  var body = '<div style="background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:12px">'
    + '<p style="font-size:13px;color:var(--red);font-weight:700;margin:0 0 4px">' + (ex.short||'') + '</p>'
    + '<p style="font-size:12px;color:var(--text3);margin:0;line-height:1.6">' + (ex.explain||'') + '</p>'
    + '</div>'
    + '<div style="display:flex;justify-content:space-between;margin-bottom:10px">'
    + '<span style="font-size:12px;color:var(--muted)">' + hands.length + ' hands</span>'
    + '<span style="font-size:13px;font-weight:700;color:' + bbCol + '">' + (net>=0?'+':'') + net.toFixed(1) + ' BB</span>'
    + '</div>';

  for (var i=0;i<hands.length;i++){
    var h = hands[i];
    var c = h.netBB>=0?'var(--green)':'var(--red)';
    body += '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">'
      + '<div style="display:flex;gap:6px;align-items:center">'
      + '<span style="font-size:14px;font-weight:700;color:var(--text)">' + formatCards(h.holeCards) + '</span>'
      + '<span class="badge info">' + h.position + '</span>'
      + '<span style="font-size:11px;color:var(--muted)">' + h.date.slice(5) + '</span>'
      + '</div>'
      + '<div style="display:flex;gap:8px;align-items:center">'
      + '<span style="font-size:13px;font-weight:700;color:' + c + '">' + (h.netBB>=0?'+':'') + h.netBB.toFixed(1) + ' BB</span>'
      + '<button onclick="closeModal();showHandDetail(\'' + h.id + '\')" style="font-size:11px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:3px 8px;border-radius:6px;cursor:pointer">Review</button>'
      + '</div>'
      + '</div>';
  }

  document.getElementById('modal-title').textContent = (ex.label||issue) + ' — ' + hands.length + ' hands';
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').style.display = 'flex';
}

function showGridDetail(notation) {
  var tf = getEl('grid-filter');
  var skEl = getEl('grid-stakes');
  var allFiltered = filterHands(allHands, tf, skEl, 'all', 'grid-date');
  var exB = document.getElementById('grid-exclude-blindfolds');
  if (exB && exB.checked) {
    allFiltered = allFiltered.filter(function(h){
      var bf = (h.position==='SB'||h.position==='BB') && (h.pfAction==='FOLD'||h.pfAction==='CHECK_BB');
      return !bf;
    });
  }
  var hands = [];
  for (var i = 0; i < allFiltered.length; i++) {
    if (allFiltered[i].handNotation === notation) hands.push(allFiltered[i]);
  }
  if (!hands.length) { showToast('No hands with ' + notation); return; }

  var net = 0; var netUSD = 0;
  for (var i = 0; i < hands.length; i++) {
    net += hands[i].netBB;
    netUSD += hands[i].netBB * (hands[i].stakes === 'NL10' ? 0.10 : 0.25);
  }
  var bb100v = net / hands.length * 100;
  var bbCol = net >= 0 ? 'var(--green)' : 'var(--red)';

  var positions = ['BTN','CO','HJ','UTG','SB','BB'];
  var posRows = '';
  for (var pi = 0; pi < positions.length; pi++) {
    var p = positions[pi];
    var ph = []; var pnet = 0;
    for (var i = 0; i < hands.length; i++) {
      if (hands[i].position === p) { ph.push(hands[i]); pnet += hands[i].netBB; }
    }
    if (!ph.length) continue;
    var pc = pnet >= 0 ? 'var(--green)' : 'var(--red)';
    var pbb = pnet / ph.length * 100;
    posRows += '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">'
      + '<div style="display:flex;gap:8px;align-items:center">'
      + '<span class="badge info">' + p + '</span>'
      + '<span style="font-size:12px;color:var(--muted)">' + ph.length + ' hand' + (ph.length > 1 ? 's' : '') + '</span>'
      + '</div>'
      + '<span style="font-size:13px;font-weight:700;color:' + pc + '">' + (pbb >= 0 ? '+' : '') + pbb.toFixed(0) + ' bb/100</span>'
      + '</div>';
  }

  var sorted = hands.slice().sort(function(a,b){return a.netBB-b.netBB;});
  var worst = sorted.slice(0, Math.min(5, sorted.length));
  var worstRows = '';
  for (var i = 0; i < worst.length; i++) {
    var wh = worst[i];
    var wc = wh.netBB >= 0 ? 'var(--green)' : 'var(--red)';
    worstRows += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">'
      + '<div style="display:flex;gap:6px;align-items:center">'
      + '<span class="badge info">' + wh.position + '</span>'
      + '<span style="font-size:12px;color:var(--muted)">' + wh.date.slice(5) + '</span>'
      + '</div>'
      + '<div style="display:flex;gap:8px;align-items:center">'
      + '<span style="font-size:13px;font-weight:700;color:' + wc + '">' + (wh.netBB >= 0 ? '+' : '') + wh.netBB.toFixed(1) + ' BB</span>'
      + '<button onclick="closeModal();showHandDetail(\'' + wh.id + '\')" style="font-size:11px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:3px 8px;border-radius:6px;cursor:pointer">Review</button>'
      + '</div>'
      + '</div>';
  }

  var body = '<div class="stat-grid" style="margin-bottom:14px">'
    + '<div class="stat"><p class="stat-label">Dealt</p><p class="stat-value blue">' + hands.length + '</p></div>'
    + '<div class="stat"><p class="stat-label">Net BB</p><p class="stat-value" style="color:' + bbCol + '">' + (net >= 0 ? '+' : '') + net.toFixed(1) + '</p></div>'
    + '<div class="stat"><p class="stat-label">Net $</p><p class="stat-value" style="color:' + bbCol + '">' + (netUSD >= 0 ? '+' : '-') + '$' + Math.abs(netUSD).toFixed(2) + '</p></div>'
    + '<div class="stat"><p class="stat-label">BB/100</p><p class="stat-value" style="color:' + bbCol + '">' + (bb100v >= 0 ? '+' : '') + bb100v.toFixed(0) + '</p></div>'
    + '</div>'
    + '<p style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 8px">By position</p>'
    + posRows
    + '<p style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px">Worst hands</p>'
    + worstRows;

  document.getElementById('modal-title').textContent = notation + ' — ' + hands.length + ' hands';
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').style.display = 'flex';
}


// ─── DRAG DROP ────────────────────────────────────────────────
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFiles(e.dataTransfer.files)});

// ─── TOAST ────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── INIT ─────────────────────────────────────────────────────
async function init() {
  showToast('Loading data from GitHub...');
  allHands = await loadFromGitHub();
  // Patch legacy DB: fix streetReached for hands where Hero folded preflop
  allHands = allHands.map(h => {
    if (h.pfAction === 'FOLD' && h.streetReached !== 'Preflop') {
      return Object.assign({}, h, {streetReached: 'Preflop', sawFlop: 0});
    }
    return h;
  });
  renderDashboard();
  renderStoredSessions();
  setTimeout(()=>renderAnalysis(), 200);
}
